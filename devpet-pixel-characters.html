  .species{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
  .badge{display:inline-block;font-size:10px;padding:3px 8px;border-radius:3px;margin-top:4px;letter-spacing:0.5px;}
  @media(max-width:1100px){.grid{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:600px){.grid{grid-template-columns:1fr;}}
  svg{image-rendering:pixelated;shape-rendering:crispEdges;}

/* ── renderer ── */
function render(character){
  const {palette,bg,rows} = character;
  const w = COLS*CELL, h = ROWS*CELL;
  const parts = [`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">`];
  // background
  parts.push(`<rect width="${w}" height="${h}" fill="${bg}"/>`);
  // pixel fills
  for(let y=0;y<rows.length;y++){
    const row = rows[y];
    for(let x=0;x<row.length;x++){
      const ch = row[x];
      const c = palette[ch];
      if(c){
        parts.push(`<rect x="${x*CELL}" y="${y*CELL}" width="${CELL}" height="${CELL}" fill="${c}"/>`);
      }
    }
  }
  // grid lines (drawn over, low opacity)
  for(let x=0;x<=COLS;x++){
    parts.push(`<line x1="${x*CELL}" y1="0" x2="${x*CELL}" y2="${h}" stroke="${GRID_LINE}" stroke-opacity="${GRID_OPACITY}" stroke-width="1"/>`);
  }
  for(let y=0;y<=ROWS;y++){
    parts.push(`<line x1="0" y1="${y*CELL}" x2="${w}" y2="${y*CELL}" stroke="${GRID_LINE}" stroke-opacity="${GRID_OPACITY}" stroke-width="1"/>`);
  }
  parts.push('</svg>');
  return parts.join('');
}
