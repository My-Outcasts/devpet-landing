<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codepet – CODE. GROW. EARN.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Barlow Condensed', Impact, 'Arial Narrow', sans-serif;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .brand-dot {
      width: 8px;
      height: 8px;
      background: #fff;
      display: inline-block;
    }

    .brand-name {
      color: #fff;
      font-size: 13px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .hero-text {
      color: #fff;
      font-size: clamp(80px, 18vw, 260px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      line-height: 0.88;
      text-align: left;
      white-space: nowrap;
      font-family: 'Barlow Condensed', Impact, 'Arial Narrow', sans-serif;
      /* Stretch to fill width like the reference */
      width: 100%;
      padding: 0 2vw;
    }
  </style>
</head>
<body>
  <div class="brand">
    <span class="brand-dot"></span>
    <span class="brand-name">Codepet</span>
  </div>
  <div class="hero-text">CODE. GROW. EARN.</div>
</body>
</html>
